<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SnailShutter</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .password-requirements {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--color-bg-soft);
            border-radius: var(--radius-md);
            font-size: 0.8125rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .requirement-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-text-muted);
        }

        .requirement-item.valid { color: var(--color-success); }
        .requirement-item.invalid { color: var(--color-danger); }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-form-box">
                <div class="auth-logo">
                    <img src="/assets/images/logo.png" alt="SnailShutter">
                </div>

                <h1>Reset Password</h1>
                <p class="subtitle">Enter the 6-digit code sent to <span id="targetEmail" style="font-weight:600;">your email</span> and choose a new password.</p>

                <div id="alertContainer"></div>

                <form id="resetForm" style="margin-top:1.75rem;">
                    <div class="form-group">
                        <label for="otp">Verification Code</label>
                        <input type="text" id="otp" name="otp" class="form-control"
                            placeholder="6-digit code" required maxlength="6" pattern="\d{6}">
                    </div>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword" class="form-control"
                            placeholder="At least 8 characters" required minlength="8">
                        <div class="password-requirements" id="passwordRequirements">
                            <div class="requirement-item invalid" id="lengthReq">
                                <i class="fas fa-circle-xmark"></i> 8+ characters
                            </div>
                            <div class="requirement-item invalid" id="capitalReq">
                                <i class="fas fa-circle-xmark"></i> Capital letter
                            </div>
                            <div class="requirement-item invalid" id="numberReq">
                                <i class="fas fa-circle-xmark"></i> One number
                            </div>
                            <div class="requirement-item invalid" id="specialReq">
                                <i class="fas fa-circle-xmark"></i> Special char
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                            placeholder="Repeat your new password" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary w-full btn-lg" id="submitBtn" style="margin-top:0.5rem;">
                        <i class="fas fa-key"></i> Reset Password
                    </button>
                </form>

                <div class="form-footer">
                    Didn't receive the code? <a href="/auth/forgot-password.html">Try again</a>
                </div>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-right-pattern"></div>
            <div class="auth-right-inner">
                <h2>Secure<br>Reset</h2>
                <p>Choose a strong password that you haven't used before to keep your account safe.</p>
            </div>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const email = sessionStorage.getItem('resetEmail');
            if (!email) {
                window.location.href = '/auth/forgot-password.html';
                return;
            }

            document.getElementById('targetEmail').textContent = email;

            const resetForm = document.getElementById('resetForm');
            const submitBtn = document.getElementById('submitBtn');
            const alertContainer = document.getElementById('alertContainer');

            // Password validation elements
            const passwordInput = document.getElementById('newPassword');
            const lengthReq = document.getElementById('lengthReq');
            const capitalReq = document.getElementById('capitalReq');
            const numberReq = document.getElementById('numberReq');
            const specialReq = document.getElementById('specialReq');

            // Real-time password validation
            passwordInput.addEventListener('input', function () {
                validatePasswordRequirements(this.value);
            });

            function validatePasswordRequirements(password) {
                let isValid = true;

                // Length requirement (8+ characters)
                if (password.length >= 8) {
                    lengthReq.innerHTML = '<i class="fas fa-circle-check"></i> 8+ characters';
                    lengthReq.className = 'requirement-item valid';
                } else {
                    lengthReq.innerHTML = '<i class="fas fa-circle-xmark"></i> 8+ characters';
                    lengthReq.className = 'requirement-item invalid';
                    isValid = false;
                }

                // Capital letter requirement
                if (/[A-Z]/.test(password)) {
                    capitalReq.innerHTML = '<i class="fas fa-circle-check"></i> Capital letter';
                    capitalReq.className = 'requirement-item valid';
                } else {
                    capitalReq.innerHTML = '<i class="fas fa-circle-xmark"></i> Capital letter';
                    capitalReq.className = 'requirement-item invalid';
                    isValid = false;
                }

                // Number requirement
                if (/[0-9]/.test(password)) {
                    numberReq.innerHTML = '<i class="fas fa-circle-check"></i> One number';
                    numberReq.className = 'requirement-item valid';
                } else {
                    numberReq.innerHTML = '<i class="fas fa-circle-xmark"></i> One number';
                    numberReq.className = 'requirement-item invalid';
                    isValid = false;
                }

                // Special character requirement
                if (/[!@#$%^&*]/.test(password)) {
                    specialReq.innerHTML = '<i class="fas fa-circle-check"></i> Special char';
                    specialReq.className = 'requirement-item valid';
                } else {
                    specialReq.innerHTML = '<i class="fas fa-circle-xmark"></i> Special char';
                    specialReq.className = 'requirement-item invalid';
                    isValid = false;
                }

                return isValid;
            }

            resetForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                const otp = document.getElementById('otp').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Complexity validation
                const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
                if (!passwordRegex.test(newPassword)) {
                    alertContainer.innerHTML = '<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Password must include 8+ chars, 1 uppercase, 1 number, and 1 special char.</div>';
                    return;
                }

                if (newPassword !== confirmPassword) {
                    alertContainer.innerHTML = '<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Passwords do not match</div>';
                    return;
                }

                alertContainer.innerHTML = '';
                submitBtn.disabled = true;
                const originalHTML = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

                try {
                    const response = await api.resetPassword(email, otp, newPassword);
                    if (response.success) {
                        alertContainer.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> ' + response.message + '</div>';
                        sessionStorage.removeItem('resetEmail');
                        setTimeout(() => {
                            window.location.href = '/auth/login.html';
                        }, 2000);
                    } else {
                        alertContainer.innerHTML = '<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> ' + response.error + '</div>';
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalHTML;
                    }
                } catch (error) {
                    alertContainer.innerHTML = '<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> ' + error.message + '</div>';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalHTML;
                }
            });
        });
    </script>
</body>

</html>
