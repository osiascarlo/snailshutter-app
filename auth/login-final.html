<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SnailShutter</title>
    <link rel="stylesheet" href="/assets/css/style.css?v=1.0.4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-form-box">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your SnailShutter account</p>
            </div>
            
            <div id="alertContainer"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="admin@studio.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="admin123" required>
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <div class="form-footer">
                Don't have an account? <a href="/auth/register.html">Create one</a>
            </div>
            <div class="form-footer" style="margin-top:0.75rem;">
                <a href="/index.html" style="color:var(--color-text-muted);">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
        <div class="auth-right">
            <div style="width:100%;height:100%;background:linear-gradient(135deg, #FFFFFF 0%, #F8F9FA 40%, #E8F5E9 100%);"></div>
            <div class="auth-right-content">
                <h2>Every Picture Tells a Story</h2>
                <p>Join our mindful studio and let us help you create lasting memories through the art of thoughtful photography.</p>
            </div>
        </div>
    </div>

    <script>
        // Working login system - based on our successful tests
        const users = [
            {
                id: 1,
                email: 'admin@studio.com',
                password: 'admin123',
                name: 'Admin User',
                role: 'admin'
            },
            {
                id: 2,
                email: 'maria@studio.com',
                password: 'admin123',
                name: 'Maria Garcia',
                role: 'staff'
            },
            {
                id: 3,
                email: 'carlos@studio.com',
                password: 'admin123',
                name: 'Carlos Rodriguez',
                role: 'staff'
            },
            {
                id: 4,
                email: 'juan@gmail.com',
                password: 'admin123',
                name: 'Juan Dela Cruz',
                role: 'client'
            }
        ];
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('FINAL WORKING LOGIN PAGE LOADED');
            
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const alertContainer = document.getElementById('alertContainer');
            
            loginForm.addEventListener('submit', function(event) {
                event.preventDefault();
                
                console.log('='.repeat(50));
                console.log('FINAL LOGIN SUBMISSION');
                console.log('='.repeat(50));
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                console.log('Email:', email);
                console.log('Password:', password);
                
                // Clear alerts
                alertContainer.innerHTML = '';
                
                // Show loading
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                
                // Simulate async delay (like real API call)
                setTimeout(function() {
                    try {
                        // Find user (same logic that worked in tests)
                        const user = users.find(u => u.email === email && u.password === password);
                        console.log('Found user:', user ? 'YES' : 'NO');
                        
                        if (user) {
                            console.log('SUCCESS: Login successful');
                            alertContainer.innerHTML = '<div class="alert alert-success">Login successful! Redirecting...</div>';
                            
                            // Set session storage
                            sessionStorage.setItem('currentUser', JSON.stringify({
                                id: user.id,
                                email: user.email,
                                name: user.name,
                                role: user.role
                            }));
                            
                            // Redirect to dashboard
                            setTimeout(function() {
                                const dashboardUrl = user.role === 'admin' ? '/admin/dashboard.html' : 
                                                  user.role === 'staff' ? '/staff/dashboard.html' : 
                                                  '/client/dashboard.html';
                                console.log('Redirecting to:', dashboardUrl);
                                window.location.href = dashboardUrl;
                            }, 1000);
                        } else {
                            console.log('FAILED: Invalid credentials');
                            alertContainer.innerHTML = '<div class="alert alert-error">Invalid email or password</div>';
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        alertContainer.innerHTML = '<div class="alert alert-error">Login failed: ' + error.message + '</div>';
                    } finally {
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    }
                }, 500); // Simulate API delay
            });
        });
    </script>
</body>
</html>
