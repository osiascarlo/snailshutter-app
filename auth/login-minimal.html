<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SnailShutter</title>
    <link rel="stylesheet" href="/assets/css/style.css?v=1.0.4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-form-box">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your SnailShutter account</p>
            </div>
            
            <div id="alertContainer"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="admin@studio.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="admin123" required>
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <div class="form-footer">
                Don't have an account? <a href="/auth/register.html">Create one</a>
            </div>
            <div class="form-footer" style="margin-top:0.75rem;">
                <a href="/index.html" style="color:var(--color-text-muted);">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
        <div class="auth-right">
            <div style="width:100%;height:100%;background:linear-gradient(135deg, #FFFFFF 0%, #F8F9FA 40%, #E8F5E9 100%);"></div>
            <div class="auth-right-content">
                <h2>Every Picture Tells a Story</h2>
                <p>Join our mindful studio and let us help you create lasting memories through the art of thoughtful photography.</p>
            </div>
        </div>
    </div>

    <script src="/assets/js/mock-api.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('MINIMAL LOGIN PAGE LOADED');
            
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const alertContainer = document.getElementById('alertContainer');
            
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('MINIMAL LOGIN SUBMISSION');
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                console.log('Email:', email);
                console.log('Password:', password);
                
                // Clear alerts
                alertContainer.innerHTML = '';
                
                // Show loading
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                
                try {
                    // Direct mock API call - bypass auth.js completely
                    console.log('CALLING MOCK API DIRECTLY...');
                    const result = await mockAPI.login(email, password);
                    console.log('MOCK API RESULT:', result);
                    
                    if (result.success) {
                        console.log('LOGIN SUCCESSFUL');
                        alertContainer.innerHTML = '<div class="alert alert-success">Login successful! Redirecting...</div>';
                        
                        // Set current user manually
                        sessionStorage.setItem('currentUser', JSON.stringify(result.data));
                        
                        // Redirect based on role
                        setTimeout(() => {
                            const dashboardUrl = result.data.role === 'admin' ? '/admin/dashboard.html' : 
                                              result.data.role === 'staff' ? '/staff/dashboard.html' : 
                                              '/client/dashboard.html';
                            window.location.href = dashboardUrl;
                        }, 1000);
                    } else {
                        console.log('LOGIN FAILED');
                        alertContainer.innerHTML = '<div class="alert alert-error">' + (result.error || 'Login failed') + '</div>';
                    }
                } catch (error) {
                    console.error('LOGIN ERROR:', error);
                    alertContainer.innerHTML = '<div class="alert alert-error">' + error.message + '</div>';
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                }
            });
        });
    </script>
</body>
</html>
