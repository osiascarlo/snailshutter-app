<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings | SnailShutter</title>
    <link rel="stylesheet" href="/assets/css/style.css?v=1.0.4">
    <link rel="stylesheet" href="/assets/css/responsive.css?v=1.0.4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .settings-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .avatar-upload {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .avatar-preview {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--color-primary-light);
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--color-primary);
            overflow: hidden;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--color-primary);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid white;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            transform: scale(1.1);
            background: var(--color-primary-dark);
        }

        #avatarInput {
            display: none;
        }

        .settings-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .settings-card h3 {
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
    <link rel="stylesheet" href="/assets/css/dashboard-premium.css?v=1.0.4">
</head>

<body class="premium-dashboard">
    <div class="dashboard-layout">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/client/dashboard.html" class="sidebar-logo">
                    <img src="/assets/images/logo.png" alt="SnailShutter" >
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Main</div>
                    <a href="/client/dashboard.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-th-large"></i></span> Dashboard
                    </a>
                    <a href="/client/book.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-plus-circle"></i></span> Book Session
                    </a>
                    <a href="/client/bookings.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-history"></i></span> My Bookings
                    </a>
                    <a href="/client/settings.html" class="sidebar-link active">
                        <span class="icon"><i class="fas fa-user-cog"></i></span> Profile Settings
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar" data-user-initial></div>
                    <div class="sidebar-user-info">
                        <div class="name" data-user-name></div>
                        <div class="role" data-user-role></div>
                    </div>
                </div>
                <a href="#" data-logout class="sidebar-link" style="margin-top:0.75rem;padding-left:0;">
                    <span class="icon"><i class="fas fa-sign-out-alt"></i></span> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-hero">
                <h1>Profile Settings</h1>
                <p>Manage your account information and preferences</p>
            </div>


            <div class="content-body">
                <div id="alertContainer"></div>

                <div class="settings-container">
                    <!-- Profile Header with Avatar -->
                    <div class="profile-header">
                        <div class="avatar-upload">
                            <div class="avatar-preview" id="avatarPreview">
                                <span id="initialsContainer"></span>
                            </div>
                            <label for="avatarInput" class="upload-btn">
                                <i class="fas fa-camera"></i>
                            </label>
                            <input type="file" id="avatarInput" accept="image/*">
                        </div>
                        <div class="profile-info">
                            <h2 id="displayFullName"></h2>
                            <p id="displayEmail" style="color: var(--color-text-muted);"></p>
                            <span class="status-badge status-client" style="margin-top: 0.5rem; display: inline-block;">Client</span>
                        </div>
                    </div>

                    <!-- Personal Details -->
                    <div class="settings-card">
                        <h3><i class="fas fa-user"></i> Personal Details</h3>
                        <form id="profileForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="fullName">Full Name</label>
                                    <input type="text" id="fullName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label for="email">Email Address</label>
                                    <input type="email" id="email" class="form-control" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="phone">Phone Number</label>
                                    <input type="tel" id="phone" class="form-control">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </form>
                    </div>

                    <!-- Change Password -->
                    <div class="settings-card">
                        <h3><i class="fas fa-lock"></i> Change Password</h3>
                        <form id="passwordForm">
                            <div class="form-group">
                                <label for="currentPassword">Current Password</label>
                                <input type="password" id="currentPassword" class="form-control" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="newPassword">New Password</label>
                                    <input type="password" id="newPassword" class="form-control" required minlength="8">
                                </div>
                                <div class="form-group">
                                    <label for="confirmPassword">Confirm New Password</label>
                                    <input type="password" id="confirmPassword" class="form-control" required minlength="8">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-secondary">Update Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Required Scripts -->
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/dashboard-premium.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            if (!auth.requireAuth('client')) return;

            // Handle logout
            document.querySelector('[data-logout]').addEventListener('click', (e) => {
                e.preventDefault();
                auth.logout();
            });

            // Load profile data
            await loadProfile();

            // Avatar Upload
            const avatarInput = document.getElementById('avatarInput');
            avatarInput.addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append('avatar', file);

                try {
                    const response = await api.uploadAvatar(formData);
                    if (response.success) {
                        showAlert('Avatar updated successfully', 'success');
                        await loadProfile(); // Refresh profile and sidebars
                        
                        // Update the stored user in sessionStorage so other pages show new avatar
                        const storedUser = JSON.parse(sessionStorage.getItem('currentUser'));
                        storedUser.avatar = response.avatar;
                        sessionStorage.setItem('currentUser', JSON.stringify(storedUser));
                        auth.currentUser = storedUser;
                        auth.updateUI();
                    }
                } catch (error) {
                    showAlert(error.message || 'Failed to upload avatar', 'error');
                }
            });

            // Profile Update
            document.getElementById('profileForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;

                try {
                    const response = await api.updateUserProfile({ full_name: fullName, email, phone });
                    if (response.success) {
                        showAlert('Profile updated successfully', 'success');
                        await loadProfile();
                        
                        // Update storage
                        const storedUser = JSON.parse(sessionStorage.getItem('currentUser'));
                        storedUser.name = fullName;
                        storedUser.email = email;
                        sessionStorage.setItem('currentUser', JSON.stringify(storedUser));
                        auth.currentUser = storedUser;
                        auth.updateUI();
                    }
                } catch (error) {
                    showAlert(error.message || 'Failed to update profile', 'error');
                }
            });

            // Password Update
            document.getElementById('passwordForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    showAlert('Passwords do not match', 'error');
                    return;
                }

                try {
                    const response = await api.updatePassword({ current_password: currentPassword, new_password: newPassword });
                    if (response.success) {
                        showAlert('Password updated successfully', 'success');
                        e.target.reset();
                    }
                } catch (error) {
                    showAlert(error.message || 'Failed to update password', 'error');
                }
            });
        });

        async function loadProfile() {
            try {
                const response = await api.getUserProfile();
                if (response.success) {
                    const user = response.user;
                    
                    document.getElementById('displayFullName').textContent = user.full_name;
                    document.getElementById('displayEmail').textContent = user.email;
                    
                    document.getElementById('fullName').value = user.full_name;
                    document.getElementById('email').value = user.email;
                    document.getElementById('phone').value = user.phone || '';

                    // Update Avatar Preview
                    const preview = document.getElementById('avatarPreview');
                    const initials = document.getElementById('initialsContainer');
                    
                    if (user.avatar) {
                        preview.innerHTML = `<img src="${user.avatar}" alt="Profile avatar">`;
                    } else {
                        preview.innerHTML = `<span id="initialsContainer">${user.full_name.charAt(0).toUpperCase()}</span>`;
                    }
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
    </script>
</body>

</html>
