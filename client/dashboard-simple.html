<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | SnailShutter</title>
    <link rel="stylesheet" href="/assets/css/style.css?v=1.0.4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .service-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .service-actions .btn {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <button class="mobile-menu-btn" onclick="toggleSidebar()"
            style="position:fixed;top:1.25rem;left:1rem;z-index:110;">
            <i class="fas fa-bars"></i>
        </button>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/index.html" class="sidebar-logo">
                    <img src="/assets/images/logo.png" alt="SnailShutter" >
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Main</div>
                    <a href="/client/dashboard.html" class="sidebar-link active">
                        <span class="icon"><i class="fas fa-th-large"></i></span> Dashboard
                    </a>
                    <a href="/client/book.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-plus-circle"></i></span> Book Session
                    </a>
                    <a href="/client/bookings.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-history"></i></span> My Bookings
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-info">
                        <div class="name" data-user-name></div>
                        <div class="role" data-user-role></div>
                    </div>
                </div>
                <a href="#" data-logout class="sidebar-link" style="margin-top:0.75rem;padding-left:0;">
                    <span class="icon"><i class="fas fa-sign-out-alt"></i></span> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="header-content">
                    <h1 class="page-title">Welcome back, <span data-user-name></span>!</h1>
                    <p class="page-subtitle">Manage your photography sessions and view your booking history.</p>
                </div>
            </header>

            <div class="content-body">
                <div class="dashboard-grid">
                    <div class="card">
                        <div class="card-header">
                            <h3>Quick Stats</h3>
                        </div>
                        <div class="card-body">
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <div class="stat-value">0</div>
                                    <div class="stat-label">Total Bookings</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value">0</div>
                                    <div class="stat-label">Upcoming</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value">0</div>
                                    <div class="stat-label">Completed</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3>Recent Bookings</h3>
                        </div>
                        <div class="card-body">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Service</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="4"
                                            style="text-align:center;padding:2rem;color:var(--color-text-muted);">
                                            No bookings found. <a href="/client/book.html">Book your first session!</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Required API Scripts -->
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/main.js"></script>

    <script>
        // Simple working dashboard - no external dependencies

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            if (sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            } else {
                sidebar.classList.add('active');
                overlay.classList.add('active');
            }
        }

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', async function () {
            console.log('Simple dashboard loaded');

            // Check if user is logged in
            if (!auth.requireAuth('client')) return;

            // Handle logout
            document.querySelector('[data-logout]').addEventListener('click', (e) => {
                e.preventDefault();
                auth.logout();
            });

            const user = auth.currentUser;
            console.log('User logged in:', user);

            // Update UI
            document.querySelectorAll('[data-user-name]').forEach(el => {
                el.textContent = user.name;
            });
            document.querySelectorAll('[data-user-role]').forEach(el => {
                el.textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
            });
        });
    </script>
</body>

</html>
