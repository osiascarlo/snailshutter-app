<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services Management | SnailShutter</title>
    <link rel="stylesheet" href="/assets/css/style.css?v=1.0.4">
    <link rel="stylesheet" href="/assets/css/responsive.css?v=1.0.4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .service-card {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
        }

        .service-card-image {
            height: 180px;
            position: relative;
            overflow: hidden;
        }

        .service-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .service-card:hover .service-card-image img {
            transform: scale(1.1);
        }

        .category-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            color: var(--color-primary-dark);
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-sm);
            z-index: 2;
        }

        .service-card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .service-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: var(--color-text);
            line-height: 1.2;
        }

        .service-description {
            font-size: 0.9rem;
            color: var(--color-text-soft);
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.7rem;
        }

        .service-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border-soft);
        }

        .service-price {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--color-primary);
            font-family: 'DM Sans', sans-serif;
        }

        .service-duration {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--color-text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .service-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        .service-actions .btn {
            flex: 1;
            padding: 0.6rem;
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--color-text-muted);
            background: var(--color-bg-soft);
            border-radius: var(--radius-lg);
            border: 2px dashed var(--color-border);
        }

        .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            opacity: 0.3;
        }
    </style>
    <link rel="stylesheet" href="/assets/css/dashboard-premium.css?v=1.0.4">
</head>

<body class="premium-dashboard">
    <div class="dashboard-layout">
        <button class="mobile-menu-btn" onclick="toggleSidebar()"
            style="position:fixed;top:1.25rem;left:1rem;z-index:110;">
            <i class="fas fa-bars"></i>
        </button>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/admin/dashboard.html" class="sidebar-logo">
                    <img src="/assets/images/logo.png" alt="SnailShutter"
                        >
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Admin</div>
                    <a href="/admin/dashboard.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-tachometer-alt"></i></span> Dashboard
                    </a>
                    <a href="/admin/bookings.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-calendar"></i></span> All Bookings
                    </a>
                    <a href="/admin/calendar.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-calendar-alt"></i></span> Calendar
                    </a>
                    <a href="/admin/gallery.html" class="sidebar-link"><span class="icon"><i class="fas fa-images"></i></span> Photo Gallery</a>
                    <a href="/admin/analytics.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-chart-bar"></i></span> Analytics & Reports
                    </a>
                    <a href="/admin/users.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-users"></i></span> Users
                    </a>
                    <a href="/admin/services.html" class="sidebar-link active">
                        <span class="icon"><i class="fas fa-camera"></i></span> Services
                    </a>
                    <a href="/admin/settings.html" class="sidebar-link">
                        <span class="icon"><i class="fas fa-cog"></i></span> Settings
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <div class="user-info">
                        <div class="name" data-user-name></div>
                        <div class="role">Administrator</div>
                    </div>
                </div>
                <a href="#" data-logout class="sidebar-link" style="margin-top:0.75rem;padding-left:0;">
                    <span class="icon"><i class="fas fa-sign-out-alt"></i></span> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-hero">
                <h1>Services Management — Welcome, <span data-user-name></span>!</h1>
                <p>Manage photography services, pricing, and availability.</p>
            </div>

            <div class="content-body">
                <!-- Add Service Button -->
                <div style="margin-bottom: 2rem;">
                    <a href="#" onclick="showAddServiceForm()" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add New Service
                    </a>
                </div>

                <!-- Services Grid -->
                <div class="services-grid" id="servicesGrid">
                    <!-- Services will be loaded here by JavaScript -->
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="empty-state" style="display:none;">
                    <div class="empty-icon">📷</div>
                    <h3>No Services Found</h3>
                    <p>No photography services have been created yet.</p>
                </div>
            </div>
        </main>
    </div>
    <!-- Required API Scripts -->
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/dashboard-premium.js"></script>

    <script>
        // Admin services functionality

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            if (sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            } else {
                sidebar.classList.add('active');
                overlay.classList.add('active');
            }
        }

        let loadedServices = [];

        function showAddServiceForm() {
            showServiceModal();
        }

        async function updateServices() {
            const servicesGrid = document.getElementById('servicesGrid');
            const emptyState = document.getElementById('emptyState');

            try {
                const response = await api.getServices(true);
                loadedServices = response.data || [];

                if (loadedServices.length === 0) {
                    servicesGrid.style.display = 'none';
                    emptyState.style.display = 'block';
                } else {
                    servicesGrid.style.display = 'grid';
                    emptyState.style.display = 'none';

                    servicesGrid.innerHTML = loadedServices.map(service => `
                        <div class="service-card animate-fade-in" style="${!service.is_active ? 'opacity: 0.7; filter: grayscale(0.5);' : ''}">
                            <div class="service-card-image">
                                <span class="category-badge">${service.category || 'General'}</span>
                                <img src="${service.image_url || '/assets/images/services/photobooth.png'}" alt="${service.name}">
                                ${!service.is_active ? '<div style="position:absolute; inset:0; background:rgba(0,0,0,0.4); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.2rem; z-index:5;">INACTIVE</div>' : ''}
                            </div>
                            <div class="service-card-content">
                                <div class="service-name">${service.name}</div>
                                <div class="service-description" title="${service.description || ''}">${service.description || 'No description available.'}</div>
                                <div class="service-meta">
                                    <div class="service-price">₱${parseFloat(service.price).toLocaleString()}</div>
                                    <div class="service-duration">
                                        <i class="far fa-clock"></i> ${service.duration_minutes > 0 ? `${service.duration_minutes} min` : 'Custom'}
                                    </div>
                                </div>
                                <div class="service-actions">
                                    <button class="btn btn-secondary btn-sm" onclick="editService(${service.id})">
                                        <i class="fas fa-edit"></i> Edit
                                    </button>
                                    <button class="btn ${service.is_active ? 'btn-warning' : 'btn-success'} btn-sm" onclick="toggleServiceStatus(${service.id}, ${service.is_active})">
                                        <i class="fas ${service.is_active ? 'fa-eye-slash' : 'fa-eye'}"></i> ${service.is_active ? 'Hide' : 'Show'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Failed to load services:', error);
                servicesGrid.innerHTML = `<p class="alert alert-error">Failed to load services. Please try again later.</p>`;
            }
        }

        function editService(id) {
            const service = loadedServices.find(s => s.id === id);
            if (!service) {
                showAlert('Service not found', 'error');
                return;
            }
            showServiceModal(service);
        }

        async function toggleServiceStatus(id, currentStatus) {
            try {
                const action = currentStatus ? 'hide' : 'show';
                const confirm = await showConfirm({
                    title: `${currentStatus ? 'Hide' : 'Show'} Service`,
                    message: `Are you sure you want to ${currentStatus ? 'hide' : 'show'} this service?`,
                    confirmText: currentStatus ? 'Hide' : 'Show',
                    type: currentStatus ? 'danger' : 'confirm'
                });
                if (!confirm) return;

                const response = await api.updateService(id, { is_active: !currentStatus });
                if (response.success) {
                    showAlert(`Service ${currentStatus ? 'hidden' : 'shown'} successfully`, 'success');
                    updateServices();
                }
            } catch (error) {
                showAlert(error.message || 'Failed to update service status', 'error');
            }
        }

        function showServiceModal(service = null) {
            const isEdit = !!service;
            
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'serviceModal';
            
            overlay.innerHTML = `
                <div class="modal" style="max-width: 550px;">
                    <div class="modal-header">
                        <h3>${isEdit ? 'Edit Service' : 'Add New Service'}</h3>
                        <button class="modal-close" onclick="closeServiceModal()"><i class="fas fa-times"></i></button>
                    </div>
                    <form id="serviceForm">
                        <div class="modal-body">
                            <div class="form-group" style="margin-bottom: 1.25rem;">
                                <label for="modalServiceName" style="display:block; margin-bottom:0.5rem; font-weight:600;">Service Name *</label>
                                <input type="text" id="modalServiceName" class="form-control" required placeholder="e.g. Portrait Session" value="${isEdit ? escapeHtml(service.name) : ''}">
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem;">
                                <div class="form-group">
                                    <label for="modalServiceCategory" style="display:block; margin-bottom:0.5rem; font-weight:600;">Category</label>
                                    <input type="text" id="modalServiceCategory" class="form-control" placeholder="e.g. Portrait" value="${isEdit ? escapeHtml(service.category || '') : ''}">
                                </div>
                                <div class="form-group">
                                    <label for="modalServiceDuration" style="display:block; margin-bottom:0.5rem; font-weight:600;">Duration (mins) *</label>
                                    <input type="number" id="modalServiceDuration" class="form-control" required min="1" placeholder="60" value="${isEdit ? service.duration_minutes : '60'}">
                                </div>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem;">
                                <div class="form-group">
                                    <label for="modalServicePrice" style="display:block; margin-bottom:0.5rem; font-weight:600;">Price (₱) *</label>
                                    <input type="number" id="modalServicePrice" class="form-control" required min="0" step="0.01" placeholder="1500" value="${isEdit ? service.price : ''}">
                                </div>
                                <div class="form-group">
                                    <label for="modalServiceImage" style="display:block; margin-bottom:0.5rem; font-weight:600;">Service Image</label>
                                    <input type="file" id="modalServiceImage" class="form-control" accept="image/*">
                                    ${isEdit && service.image_url ? `<span style="font-size:0.75rem; color:var(--color-text-muted); display:block; margin-top:0.25rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">Current: ${escapeHtml(service.image_url.split('/').pop())}</span>` : ''}
                                </div>
                            </div>
                            
                            <div class="form-group" style="margin-bottom: 0.5rem;">
                                <label for="modalServiceDescription" style="display:block; margin-bottom:0.5rem; font-weight:600;">Description</label>
                                <textarea id="modalServiceDescription" class="form-control" rows="4" placeholder="Describe this photography service..." style="resize:vertical;">${isEdit ? escapeHtml(service.description || '') : ''}</textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="closeServiceModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary btn-sm">${isEdit ? 'Save Changes' : 'Create Service'}</button>
                        </div>
                    </form>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            // Force reflow and add active class for transition
            overlay.offsetHeight;
            overlay.classList.add('active');
            
            document.getElementById('serviceForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const name = document.getElementById('modalServiceName').value.trim();
                const category = document.getElementById('modalServiceCategory').value.trim();
                const duration_minutes = parseInt(document.getElementById('modalServiceDuration').value);
                const price = parseFloat(document.getElementById('modalServicePrice').value);
                const description = document.getElementById('modalServiceDescription').value.trim();
                const imageInput = document.getElementById('modalServiceImage');
                
                const formData = new FormData();
                formData.append('name', name);
                formData.append('category', category || '');
                formData.append('duration_minutes', duration_minutes);
                formData.append('price', price);
                formData.append('description', description || '');
                
                if (imageInput.files[0]) {
                    formData.append('image', imageInput.files[0]);
                }
                
                try {
                    let response;
                    if (isEdit) {
                        response = await api.updateService(service.id, formData);
                    } else {
                        response = await api.createService(formData);
                    }
                    
                    if (response.success) {
                        showAlert(isEdit ? 'Service updated successfully' : 'Service created successfully', 'success');
                        closeServiceModal();
                        updateServices();
                    }
                } catch (error) {
                    showAlert(error.message || 'Failed to save service', 'error');
                }
            });
        }

        function closeServiceModal() {
            const modal = document.getElementById('serviceModal');
            if (modal) {
                modal.classList.remove('active');
                setTimeout(() => modal.remove(), 300);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Initialize admin services page
        document.addEventListener('DOMContentLoaded', async function () {
            console.log('Admin services page loaded');

            // Check if user is logged in and is admin
            if (!auth.requireAuth('admin')) return;

            // Handle logout
            document.querySelector('[data-logout]').addEventListener('click', (e) => {
                e.preventDefault();
                auth.logout();
            });

            const user = auth.currentUser;
            console.log('User logged in:', user);

            // Update UI
            document.querySelectorAll('[data-user-name]').forEach(el => {
                el.textContent = user.name;
            });

            // Update services
            updateServices();
        });
    </script>
</body>

</html>
